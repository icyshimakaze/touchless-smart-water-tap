<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Smart Touchless Water Tap – Circuit Diagram</title>
  <desc>Wiring diagram showing Arduino Uno connected to HC-SR04, SG90 Servo, SSD1306 OLED, and Buzzer</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="230" y="200" width="220" height="180" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="230" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Arduino Uno</text>
  <text font-family="sans-serif" font-size="12" x="340" y="250" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ATmega328P</text>
  <text font-family="sans-serif" font-size="11" x="248" y="278" dominant-baseline="central" fill="#185FA5">Pin 10 → TRIG</text>
  <text font-family="sans-serif" font-size="11" x="248" y="296" dominant-baseline="central" fill="#185FA5">Pin 11 → ECHO</text>
  <text font-family="sans-serif" font-size="11" x="248" y="314" dominant-baseline="central" fill="#185FA5">Pin 6  → SERVO</text>
  <text font-family="sans-serif" font-size="11" x="248" y="332" dominant-baseline="central" fill="#185FA5">A4/A5  → I2C</text>
  <text font-family="sans-serif" font-size="11" x="248" y="350" dominant-baseline="central" fill="#185FA5">Pin 8  → BUZZ</text>

  <rect x="30" y="40" width="160" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" x="110" y="68" text-anchor="middle" dominant-baseline="central" fill="#085041">HC-SR04</text>
  <text font-family="sans-serif" font-size="12" x="110" y="90" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Ultrasonic Sensor</text>

  <rect x="490" y="40" width="160" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" x="570" y="68" text-anchor="middle" dominant-baseline="central" fill="#712B13">SG90 Servo</text>
  <text font-family="sans-serif" font-size="12" x="570" y="90" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Tap controller</text>

  <rect x="30" y="430" width="160" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" x="110" y="458" text-anchor="middle" dominant-baseline="central" fill="#3C3489">OLED 0.91"</text>
  <text font-family="sans-serif" font-size="12" x="110" y="478" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SSD1306 I2C</text>

  <rect x="490" y="430" width="160" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" x="570" y="458" text-anchor="middle" dominant-baseline="central" fill="#633806">Buzzer</text>
  <text font-family="sans-serif" font-size="12" x="570" y="478" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Passive 5V</text>

  <path d="M190 68 L210 68 L210 278 L230 278" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M190 80 L215 80 L215 296 L230 296" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M490 68 L460 68 L460 314 L450 314" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M190 458 L210 458 L210 332 L230 332" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M490 458 L460 458 L460 350 L450 350" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text font-family="sans-serif" font-size="11" x="200" y="262" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">TRIG</text>
  <text font-family="sans-serif" font-size="11" x="218" y="303" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ECHO</text>
  <text font-family="sans-serif" font-size="11" x="456" y="300" text-anchor="middle" dominant-baseline="central" fill="#D85A30">SIG</text>
  <text font-family="sans-serif" font-size="11" x="200" y="398" text-anchor="middle" dominant-baseline="central" fill="#7F77DD">SDA/SCL</text>
  <text font-family="sans-serif" font-size="11" x="456" y="420" text-anchor="middle" dominant-baseline="central" fill="#BA7517">Pin 8</text>

  <line x1="110" y1="120" x2="110" y2="160" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text font-family="sans-serif" font-size="10" x="113" y="142" dominant-baseline="central" fill="#888780">VCC/GND</text>
  <line x1="570" y1="120" x2="570" y2="160" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text font-family="sans-serif" font-size="10" x="573" y="142" dominant-baseline="central" fill="#888780">VCC/GND</text>
  <line x1="110" y1="510" x2="110" y2="550" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text font-family="sans-serif" font-size="10" x="113" y="530" dominant-baseline="central" fill="#888780">VCC/GND</text>
  <line x1="570" y1="510" x2="570" y2="550" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text font-family="sans-serif" font-size="10" x="573" y="530" dominant-baseline="central" fill="#888780">GND</text>

  <rect x="230" y="530" width="220" height="40" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="242" y1="550" x2="258" y2="550" stroke="#1D9E75" stroke-width="1.5"/>
  <text font-family="sans-serif" font-size="11" x="262" y="550" dominant-baseline="central" fill="#444441">Signal wire</text>
  <line x1="322" y1="550" x2="338" y2="550" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text font-family="sans-serif" font-size="11" x="342" y="550" dominant-baseline="central" fill="#444441">Power (dashed)</text>
</svg>
